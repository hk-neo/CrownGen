<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>CrownGen · boundary 위치 3-way (OLD / NEW-G1 / ARCH)</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="topbar">
  <span class="ttl">Boundary 위치 3-way — OLD vs NEW(G1) vs ARCH(아치보간)</span>
  <span class="spacer"></span>
  <button id="prevCase">◀ 이전</button>
  <select id="caseSelect"></select>
  <button id="nextCase">다음 ▶</button>
  <button id="zsepToggle" class="on">상악/하악 z분리 ON</button>
</div>
<div id="caseInfo" class="caseinfo"></div>
<div id="stage">
  <div class="pane"><div class="label c0">OLD boundary</div><div id="panel0" class="panel"></div></div>
  <div class="pane"><div class="label c1">NEW (G1)</div><div id="panel1" class="panel"></div></div>
  <div class="pane"><div class="label c2">ARCH 하이브리드 (내부 보간 + 끝자리 boundary)</div><div id="panel2" class="panel"></div></div>
</div>
<div id="info" class="info"></div>
<script src="three.min.js"></script>
<script src="OrbitControls.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
